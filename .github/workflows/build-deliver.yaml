# docker continuous delivery
# build docker images and push to configured repo, with tags to match branches and git tags
---
name: Build & Deliver
on: [push]
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      safe_ref: ${{ steps.ref.outputs.value }}
    steps:
    - name: Checkout git commit
      uses: actions/checkout@main
      with:
        fetch-depth: 0
    - name: Set version string
      id: version
      run: echo "value=$(git show -s --date=format:'%y.%m.%d.%H%M' --format=%cd)-g-$(git show -s --format=%h)-$(date +'%y%m%d-%H%M')" >> $GITHUB_OUTPUT
    
    - name: Sanitize ref name
      id: ref
      run: |
        SAFE_REF=$(echo "${GITHUB_REF_NAME}" | sed -E 's/[^A-Za-z0-9_.-]+/-/g')
        echo "value=$SAFE_REF" >> $GITHUB_OUTPUT
      
  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: prod-dynamic
            tag_suffix: ''
            instance_id: 'WAHealthSummary'
          - target: prod
            tag_suffix: '-mhs'
            instance_id: 'MyHealthSummary'
          - target: prod
            tag_suffix: '-wahs'
            instance_id: 'WAHealthSummary'
          - target: dev
            tag_suffix: '-dev'
    steps:
      - name: Checkout git commit
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.target }}${{ matrix.tag_suffix }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.setup.outputs.safe_ref }}${{ matrix.tag_suffix }}
            ${{ needs.setup.outputs.safe_ref == 'main' && format('ghcr.io/{0}:latest{1}', github.repository, matrix.tag_suffix) || '' }}
          build-args: |
            VITE_APP_VERSION_STRING=${{ needs.setup.outputs.version }}
            VITE_INSTANCE_ID=${{ matrix.instance_id }}
